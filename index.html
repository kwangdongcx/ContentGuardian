                    },

  50:'#eff6ff', 100:'#dbeafe',

                        }

                }

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>

<body>
    <div id="root"></div>

    <script type="text/babel" >
        const { useState, useRef, useEffect } = React;

        // =========================================================================
        // 🚀 [설정] 배포된 구글 앱스 스크립트(Web App) URL
        // =========================================================================
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx0H8EA1k0fV8-lyy7MOvUMoNSFxpYIh52laO-_5EZjRUV7I1J7fARe93AtI600syog/exec"; 
						 
        
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/1ccWpZql3gEdKqQIHZqkQ9rCyy_lG2IscNGwOu9Ot_dI/edit?usp=sharing"; 
        const GEMINI_PROXY_URL = "/api/gemini"; // 같은 Vercel 프로젝트에 호스팅 → 상대경로(CORS 불필요)

        // =========================================================================

        const GUIDES_DEFAULT = [
        { id: 1, priority: "Critical", category: "법적 리스크", items: [
            { id: 11, keyword: "약사법", desc: "효능·효과 단정 표현 금지", ex: ["완치", "치료됩니다", "100% 효과"] },
            { id: 12, keyword: "식품광고법", desc: "질병 예방·치료 관련 표현 금지", ex: ["암 예방", "당뇨 치료", "혈압 개선"] },
            { id: 13, keyword: "표시광고법", desc: "허위·과장 광고 금지", ex: ["업계 최초", "세계 최고", "완전 무결"] },
        ]},
        { id: 2, priority: "Critical", category: "사회 민감 이슈", items: [
            { id: 21, keyword: "정치·역사", desc: "정치·역사적 민감 표현 금지", ex: ["5.18", "탱크데이", "폭동"] },
            { id: 22, keyword: "차별·혐오", desc: "성별/지역 차별·혐오 표현 금지", ex: ["지역비하 표현", "성차별 언어"] },
        ]},
        { id: 3, priority: "High", category: "브랜드 가이드", items: [
            { id: 31, keyword: "로고 사용", desc: "로고 사용 규정 준수", ex: ["로고 무단 변형", "비공식 로고"] },
            { id: 32, keyword: "신뢰성 훼손", desc: "타사 비방 금지", ex: ["A사보다 훨씬 뛰어난", "경쟁사 직접 언급"] },
        ]}
        ];

        // 🎨 디자인 시스템
        const PRI = {
        Critical: { dot: "bg-rose-500",    light: "bg-rose-50/50",    txt: "text-rose-700",    border: "border-rose-200", badge: "bg-rose-100 text-rose-700" },
        High:     { dot: "bg-amber-500",   light: "bg-amber-50/50",   txt: "text-amber-700",   border: "border-amber-200", badge: "bg-amber-100 text-amber-700" },
        Medium:   { dot: "bg-blue-500",    light: "bg-blue-50/50",    txt: "text-blue-700",    border: "border-blue-200", badge: "bg-blue-100 text-blue-700" },
        Low:      { dot: "bg-slate-400",   light: "bg-slate-50/50",   txt: "text-slate-700",   border: "border-slate-200", badge: "bg-slate-100 text-slate-700" },
        };

        const LVL = {
        GREEN:  { bar: "bg-emerald-500",  light: "bg-emerald-50/50",  txt: "text-emerald-700",  label: "발행 가능", icon: "✓" },
        YELLOW: { bar: "bg-amber-500",    light: "bg-amber-50/50",    txt: "text-amber-700",    label: "검토 필요", icon: "!" },
        RED:    { bar: "bg-rose-500",     light: "bg-rose-50/50",     txt: "text-rose-700",     label: "발행 차단", icon: "✕" },
        };

        const TYPES = ["메인 배너", "이벤트 페이지", "상품 상세", "썸네일", "푸시 메시지", "랜덤프라이스"];

        const formatDate = (dateObj = new Date()) => {
            const pad = n => String(n).padStart(2, '0');
            return `${dateObj.getFullYear()}-${pad(dateObj.getMonth()+1)}-${pad(dateObj.getDate())} ${pad(dateObj.getHours())}:${pad(dateObj.getMinutes())}:${pad(dateObj.getSeconds())}`;
        };

        function App() {
		
			const [reviewer, setReviewer]       = useState("");   // 검수 담당자명
			const [vioComments, setVioComments] = useState({});   // { [violationIndex]: "소명 텍스트" }
			const [reReviewing, setReReviewing] = useState(false);
			const [reReviewImg, setReReviewImg] = useState(null); // 재검토용 수정 이미지 {name,url,mediaType,data}
			
            const [tab, setTab]           = useState(0);
            const [guides, setGuides]     = useState([]);
            const [imgs, setImgs]         = useState([]);
            const [txt, setTxt]           = useState("");
            const [ctype, setCtype]       = useState("메인 배너");
            
            const [approvalLines, setApprovalLines] = useState([
                { name: "기본 결재선", line: "담당, 팀장(team@example.com), 부문장(lead@example.com), 본부장, CMO" }
            ]);

            const [meta, setMeta]         = useState({ 
                date:"", manager:"", campaign:"", 
                approvalLine: "담당, 팀장(team@example.com), 부문장(lead@example.com), 본부장, CMO" 
            });
            
            const [result, setResult]     = useState(null);
            const [loading, setLoading]   = useState(false);
            const [hist, setHist]         = useState([]);
            const [dragOn, setDragOn]     = useState(false);
            const [expanded, setExpanded] = useState(null);
            const [sheetStatus, setSheetStatus] = useState("대기 중");
            
            // 🚨 대시보드 에러 표시용 상태 추가
            const [dashError, setDashError] = useState("");
            
            const fileRef = useRef();
			

            /* ── 데이터 연동 ── */
            useEffect(() => {
                if (!GAS_URL) {
                    setSheetStatus("오프라인 모드");
                    setGuides(GUIDES_DEFAULT); 
                    return;
                }
                setSheetStatus("연동 중...");
                
                // 가이드 연동
                fetch(GAS_URL + "?action=getGuides")
                    .then(res => res.json())
                    .then(data => {
                        if (!Array.isArray(data)) throw new Error("Invalid guides data");
                        const grouped = [];
                        data.forEach(row => {
                            let cat = grouped.find(g => g.category === row.Category);
                            if (!cat) {
                                cat = { id: Date.now() + Math.random(), priority: row.Priority, category: row.Category, items: [] };
                                grouped.push(cat);
                            }
                            cat.items.push({
                                id: Date.now() + Math.random(), keyword: row.Keyword, desc: row.Description,
                                ex: row.Examples ? String(row.Examples).split(',').map(s => s.trim()) : []
                            });
                        });
                        setGuides(grouped.length > 0 ? grouped : GUIDES_DEFAULT);
                        setSheetStatus("연동 완료");
                    })
                    .catch(() => { setSheetStatus("연동 실패"); setGuides(GUIDES_DEFAULT); });

                // 대시보드 히스토리 연동 (에러 상세 감지 및 대/소문자 무시 파싱 적용)
                fetch(GAS_URL + "?action=getHistory")
                    .then(async res => {
                        const text = await res.text();
                        try { 
                            const data = JSON.parse(text); 
                            if (data && data.error) throw new Error(data.error);
                            return data;
                        } 
                        catch(e) { 
                            // 백엔드에서 Action not found 문자열을 반환했을 경우 에러 전파
                            if (e.message.includes("Action not found") || text.includes("Action not found")) {
                                throw new Error("Action not found");
                            }
                            throw new Error("서버 응답 오류: 앱스 스크립트 '새 버전' 배포 상태를 확인해주세요. 응답내용: " + text.substring(0,40) + "..."); 
                        }
                    })
                    .then(data => {
                        if (!Array.isArray(data)) throw new Error("데이터 형식이 배열이 아닙니다.");
                        
                        // 구글 시트 칼럼 이름이 대소문자나 띄어쓰기가 달라도 스마트하게 찾아오는 함수
                        const getVal = (row, keys) => {
                            const key = Object.keys(row).find(k => keys.includes(k.toLowerCase().replace(/\s/g, '')));
                            return key ? row[key] : undefined;
                        };

                        const parsedHist = data.map(row => {
                            let parsedVio = [];
                            let parsedLine = ["담당", "팀장", "부문장", "본부장", "CMO"];
                            
                            const vioRaw = getVal(row, ['violations', '위반사항']);
                            try { if (vioRaw) parsedVio = typeof vioRaw === 'string' ? JSON.parse(vioRaw) : vioRaw; } catch(e) {}
                            
                            const lineRaw = getVal(row, ['approvalline', '결재선', '결재라인']);
                            try { if (lineRaw) parsedLine = typeof lineRaw === 'string' ? JSON.parse(lineRaw) : lineRaw; } catch(e) {}
                            
                            return {
								parentId:    getVal(row, ['parentid','부모id']) || null,
								reviewRound: Number(getVal(row, ['reviewround','라운드','회차'])) || 1,
								sourceText:  getVal(row, ['sourcetext','원문','원본텍스트']) || "",
                                id: getVal(row, ['id', '아이디']) || Date.now(),
                                ts: getVal(row, ['date', '날짜', '발행일']) || Date.now(),
                                score: Number(getVal(row, ['score', '점수'])) || 0,
                                level: getVal(row, ['level', '위험도', '등급']) || "GREEN",
                                contentType: getVal(row, ['contenttype', '유형', '콘텐츠유형']) || "미지정",
                                campaign: getVal(row, ['campaign', '캠페인', '캠페인명']) || "",
                                manager: getVal(row, ['manager', '기안자', '담당자']) || "",
                                summary: getVal(row, ['summary', '요약', '총평']) || "",
                                violations: parsedVio,
                                approvalLine: Array.isArray(parsedLine) ? parsedLine : ["담당", "팀장", "부문장"],
                                approvalStep: Number(getVal(row, ['approvalstep', '결재단계'])) || 0,
                                approvalState: getVal(row, ['approvalstate', '결재상태', '상태']) || "대기",
                                imageLink: getVal(row, ['imagelink', '이미지링크', '이미지']) || ""
                            };
                        }).sort((a,b) => {
                            const dateA = new Date(a.ts).getTime();
                            const dateB = new Date(b.ts).getTime();
                            return (isNaN(dateB) ? 0 : dateB) - (isNaN(dateA) ? 0 : dateA);
                        });
                        
                        setHist(parsedHist);
                        setDashError(""); // 에러가 없으면 메시지 초기화
                    }).catch(err => {
                        console.error("히스토리 로드 실패:", err);
                        if (err.message.includes("Action not found")) {
                            setDashError("백엔드에 'getHistory' 연동이 누락되었습니다.");
                        } else {
                            setDashError(err.message);
                        }
                        setHist([]); // 에러 발생 시 히스토리는 빈 배열로 초기화하여 크래시 방지
                    });

                // 결재선 연동
                fetch(GAS_URL + "?action=getApprovalLines")
                    .then(res => res.json())
                    .then(data => {
                        if (Array.isArray(data) && data.length > 0) {
                            const lines = data.map(row => ({ name: row.Name, line: row.Line }));
                            setApprovalLines(lines);
                            const matched = lines.find(al => al.name === ctype);
                            if (matched) {
                                setMeta(p => ({...p, approvalLine: matched.line}));
                            } else {
                                setMeta(p => ({...p, approvalLine: lines[0].line}));
                            }
                        }
                    })
                    .catch(err => console.error("결재선 불러오기 실패:", err));
            }, []);

            /* ── 시트 저장 ── */
            const saveToSheet = async (entry) => {
                if (!GAS_URL) { setHist(p => [entry, ...p].sort((a,b) => new Date(b.ts) - new Date(a.ts))); return; }
                try {
                    const response = await fetch(GAS_URL, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'addHistory', data: entry })
                    });
                    const resData = await response.json();
                    if (resData.imageUrl && !resData.imageUrl.includes('실패')) entry.imageLink = resData.imageUrl;
                    entry.imageData = undefined; 
                    setHist(p => [entry, ...p].sort((a,b) => new Date(b.ts) - new Date(a.ts)));
                } catch(e) {
                    console.error("저장 실패:", e); entry.imageData = undefined; 
                    setHist(p => [entry, ...p].sort((a,b) => new Date(b.ts) - new Date(a.ts))); 
                }
            };

            /* ── 결재 업데이트 ── */
            const handleApprovalAction = async (newStep, newState) => {
                if (!result) return;
                const updatedResult = { ...result, approvalStep: newStep, approvalState: newState };
                setResult(updatedResult);
                setHist(p => p.map(h => h.id === result.id ? updatedResult : h).sort((a,b) => new Date(b.ts) - new Date(a.ts)));
                if (!GAS_URL) return;
                try {
                    await fetch(GAS_URL, {
                        method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify({ action: 'updateApproval', id: result.id, step: newStep, state: newState })
                    });
                } catch(e) { alert("통신 에러가 발생했습니다."); }
            };

            /* ── 이미지 처리 ── */
            const resizeImg = img => new Promise(resolve => {
                const el = new Image();
                el.onload = () => {
                const MAX = 2048; let w = el.width, h = el.height;
                if (w > MAX || h > MAX) {
                    if (w > h) { h = Math.round(h * MAX / w); w = MAX; } else { w = Math.round(w * MAX / h); h = MAX; }
                }
                const c = document.createElement("canvas"); c.width = w; c.height = h;
                c.getContext("2d").drawImage(el, 0, 0, w, h);
                resolve({ ...img, mediaType:"image/jpeg", data:c.toDataURL("image/jpeg", 0.85).split(",")[1] });
                };
                el.onerror = () => resolve({ ...img, mediaType:"image/jpeg", data:img.data||"" });
                el.src = img.url;
            });

            const fetchWithRetry = async (url, options, maxRetries = 4) => {
                let delay = 2000;
                for (let i = 0; i < maxRetries; i++) {
                    let response;
                    try {
                        response = await fetch(url, options);
                    } catch (netErr) {
                        // 네트워크 오류 → 재시도
                        if (i === maxRetries - 1) throw netErr;
                        await new Promise(r => setTimeout(r, delay + Math.random()*500)); delay *= 2;
                        continue;
                    }
                    if (response.ok) return response;

                    // 에러 본문에서 실제 사유 / 서버 권장 대기시간 추출
                    let bodyText = "";
                    try { bodyText = await response.clone().text(); } catch (_) {}
                    let apiMsg = "", retryMs = 0;
                    try {
                        const j = JSON.parse(bodyText);
                        apiMsg = (j.error && j.error.message) || "";
                        const details = (j.error && j.error.details) || [];
                        const ri = details.find(d => String(d["@type"]||"").includes("RetryInfo"));
                        if (ri && ri.retryDelay) retryMs = (parseFloat(ri.retryDelay) || 0) * 1000;
                    } catch (_) {}
                    const retryAfter = parseInt(response.headers.get("Retry-After") || "0", 10) * 1000;
                    const retryable = (response.status === 429 || response.status === 503);

                    if (!retryable || i === maxRetries - 1) {
                        const d = apiMsg ? (" - " + apiMsg) : (bodyText ? (" - " + bodyText.slice(0,300)) : "");
                        throw new Error(`HTTP ${response.status}${d}`);
                    }
                    // 서버 권장 대기 / 지수 백오프 중 큰 값 + 지터
                    const wait = Math.max(retryMs, retryAfter, delay) + Math.random()*500;
                    await new Promise(r => setTimeout(r, wait)); delay *= 2;
                }
            };

            /* ── AI 검수 호출 ── */
            const review = async () => {
                if (!txt.trim() && imgs.length === 0) return;
                setLoading(true); setResult(null); setTab(1);
                
                const ctx = guides.map(g => `[${g.priority}] ${g.category}:\n` + g.items.map(i => `  - ${i.keyword}: ${i.desc}`).join("\n")).join("\n\n");
                
                try {
                    const processedImgs = imgs.length > 0 ? await Promise.all(imgs.map(resizeImg)) : [];
                    const modelName = "gemini-3-flash-preview";
                    const url = GEMINI_PROXY_URL;

                    const systemInstruction = `당신은 KD Content Guardian입니다.
당신은 식품의약품안전처(식약처) 고시 및 표시광고법을 완벽하게 마스터한 [광동제약 F&B사업본부 전임 식품안전/법무 심의 AI 위원] 역할을 수행합니다. 
가이드라인에 정리된 내용을 완전히 학습하고 사용자가 입력한 이미지파일과 텍스트 본문 내용을 분석해서 이 기준에 맞는지 철저하게 검역하여 판정 및 수정 가이드를 JSON으로 반환하세요.

					
					
					
=== 가이드라인 ===
${ctx}
[패턴 분석] 추모일 관련 날짜/무기 결합, 역사 폄훼("탱크데이" 등), 이미지 내 텍스트 필수 확인.
=== 점수 기준 === GREEN 0~30, YELLOW 31~70, RED 71~100.

[판정 강도 보정] 모든 지적을 위반으로 단정하지 말 것.
- '확정 위법'(법령·고시 명문 위반)과 '주의/권고'(표현 다듬기 수준)를 구분한다.
- 법적으로 금지되지 않은 주관적 표현·기호성·분위기 소구는 probability를 낮게(30 이하) 둔다.
- evidence(원문 근거)가 불명확하면 위반으로 올리지 말고 description에 '확인 필요'로만 표기한다.
`;

                    const userText = `유형:${ctype}\n캠페인:${meta.campaign}\n발행일:${meta.date}\n[텍스트]\n${txt}`;
                    const parts = [{ text: userText }];
                    processedImgs.forEach(img => parts.push({ inlineData: { mimeType: img.mediaType, data: img.data } }));

                    const payload = {
                        systemInstruction: { parts: [{ text: systemInstruction }] },
                        contents: [{ role: "user", parts: parts }],
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    score: { type: "INTEGER" }, level: { type: "STRING" }, summary: { type: "STRING" },
                                    violations: {
                                        type: "ARRAY", items: {
                                            type: "OBJECT", properties: {
                                                category: { type: "STRING" }, severity: { type: "STRING" }, probability: { type: "INTEGER" },
                                                evidence: { type: "STRING" }, description: { type: "STRING" }, suggestion: { type: "STRING" }, guideReference: { type: "STRING" }
                                            }
                                        }
                                    }
                                }

                            <div>
                                <h2 className="text-xl sm:text-2xl font-bold tracking-tight text-slate-900">운영 대시보드</h2>
                                <p className="text-xs sm:text-sm text-slate-500 mt-1">콘텐츠 리스크 관리 현황을 한눈에 파악하세요.</p>
                            </div>
                            
                            {/* 🚨 데이터 로드 에러 발생 시 노출되는 경고 배너 및 코드 안내 */}
                            {dashError && (
                                <div className="bg-rose-50 border border-rose-200 p-4 sm:p-5 rounded-2xl flex flex-col gap-3">
                                    <div className="flex items-start gap-3">
                                        <span className="text-lg">⚠️</span>
                                        <div>
                                            <div className="text-sm font-bold text-rose-800 mb-1">데이터를 불러오지 못했습니다.</div>
                                            <div className="text-xs text-rose-600 mb-2 break-all">{dashError}</div>
                                        </div>
                                    </div>
                                    {dashError.includes('누락되었습니다') && (
                                        <div className="bg-white p-4 rounded-xl border border-rose-100 text-[10px] sm:text-xs overflow-x-auto font-mono text-slate-700 shadow-inner">
                                            <div className="font-bold mb-2 text-rose-600 flex items-center gap-1.5">
                                                <span>💡</span> Apps Script의 doGet(e) 함수 내에 아래 코드를 추가하고 <b>[새 버전 배포]</b>를 진행하세요!
                                            </div>
                                            <pre className="whitespace-pre text-slate-600">
{`if (action === 'getHistory') {
  const ws = sheet.getSheetByName('History'); // 'History' 시트 이름 확인
  if (!ws) return jsonOutput([]);
  const data = ws.getDataRange().getValues();
  if (data.length <= 1) return jsonOutput([]);
  const headers = data[0];
  const result = data.slice(1).map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = row[i]);
    return obj;
  });
  return jsonOutput(result);
}`}
                                            </pre>
                                        </div>
                                    )}
                                </div>
                            )}

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4">
                                {[
                                    { label:"총 누적 검수", val:total, unit:"건", icon:"📈", clr:"text-slate-800" },
                                    { label:"위반 검출 건수", val:hist.filter(h=>h.level!=="GREEN").length, unit:"건", icon:"🚨", clr:"text-rose-600" },
                                    { label:"평균 위험 점수", val:avgScore, unit:"점", icon:"🎯", clr:"text-brand-600" },
                                    { label:"위험 차단율", val:Math.round(hist.filter(h=>h.level==="RED").length/(total||1)*100), unit:"%", icon:"🛡️", clr:"text-amber-600" },
                                ].map((k,i)=>(
                                    <div key={i} className="bg-white rounded-2xl border border-slate-200 p-4 sm:p-5 shadow-sm flex flex-col justify-between h-24 sm:h-32">
                                        <div className="flex justify-between items-start">
                                            <div className="text-[10px] sm:text-xs font-semibold text-slate-500">{k.label}</div>
                                            <div className="text-sm sm:text-lg opacity-80">{k.icon}</div>
                                        </div>
                                        <div className={`text-xl sm:text-3xl font-black tracking-tight ${k.clr}`}>
                                            {k.val}<span className="text-[10px] sm:text-sm font-medium ml-1 opacity-70">{k.unit}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                                {/* Level Distribution */}
                                <div className="bg-white rounded-2xl border border-slate-200 p-5 sm:p-6 shadow-sm">
                                    <h3 className="text-xs sm:text-sm font-bold text-slate-800 mb-4 sm:mb-6">위험도 판정 분포</h3>
                                    <div className="flex h-5 sm:h-6 rounded-full overflow-hidden gap-0.5 bg-slate-100">
                                        {["GREEN","YELLOW","RED"].map(l=>{
                                        const cnt = hist.filter(h=>h.level===l).length;
                                        const pct = Math.round(cnt/(total||1)*100);
                                        return pct>0 ? (
                                            <div key={l} className={`${LVL[l].bar} flex items-center justify-center text-white text-[9px] sm:text-[10px] font-bold transition-all`} style={{width:`${pct}%`}}>
                                                {pct > 10 ? `${pct}%` : ''}
                                            </div>
                                        ) : null;
                                        })}
                                    </div>
                                    <div className="flex flex-wrap gap-3 sm:gap-4 mt-4 sm:mt-6 justify-center">
                                        {["GREEN","YELLOW","RED"].map(l=>(
                                        <div key={l} className="flex items-center gap-1.5 sm:gap-2">
                                            <div className={`w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-sm ${LVL[l].bar}`}/>
                                            <span className="text-[10px] sm:text-xs font-medium text-slate-600">{LVL[l].label} <span className="text-slate-400 ml-1">{hist.filter(h=>h.level===l).length}</span></span>
                                        </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Top 5 */}
                                <div className="bg-white rounded-2xl border border-slate-200 p-5 sm:p-6 shadow-sm">
                                    <h3 className="text-xs sm:text-sm font-bold text-slate-800 mb-4 sm:mb-6">주요 위반 카테고리</h3>
                                    <div className="space-y-3 sm:space-y-4">
                                        {top5.length > 0 ? top5.map(([cat,cnt],i)=>(
                                            <div key={cat} className="flex items-center gap-2 sm:gap-3">
                                                <span className="text-[10px] sm:text-xs font-bold text-slate-400 w-3 shrink-0">{i+1}</span>
                                                <span className="text-[10px] sm:text-xs font-medium text-slate-700 w-20 sm:w-24 truncate shrink-0">{cat}</span>
                                                <div className="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                                                    <div className="bg-brand-500 h-full rounded-full" style={{width:`${(cnt/top5[0][1])*100}%`}}/>
                                                </div>
                                                <span className="text-[10px] sm:text-xs font-bold text-slate-600 w-6 text-right shrink-0">{cnt}</span>
                                            </div>
                                        )) : <div className="text-xs sm:text-sm text-slate-400 text-center py-4">데이터 없음</div>}
                                    </div>
                                </div>
                            </div>

                            {/* History List */}
                            <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                                <div className="px-4 py-3 sm:px-6 sm:py-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                                    <h3 className="text-xs sm:text-sm font-bold text-slate-800">최근 검수 타임라인</h3>
                                    <span className="text-[10px] sm:text-xs text-slate-400">클릭하여 상세 보기</span>
                                </div>
                                <div className="divide-y divide-slate-100">
                                    {reviewGroups.length === 0 && (
                                        <div className="text-xs sm:text-sm text-slate-400 text-center py-8">검수 이력이 없습니다.</div>
                                    )}
                                    {reviewGroups.slice(0,8).map((grp, gi) => {
                                        const latest = grp.latest;
                                        const glc = LVL[latest.level] || LVL.GREEN;
                                        let gState = "bg-slate-100 text-slate-500";
                                        if (latest.approvalState === "진행중") gState = "bg-brand-100 text-brand-700";
                                        if (latest.approvalState === "반려") gState = "bg-rose-100 text-rose-700";
                                        if (latest.approvalState === "최종 승인") gState = "bg-emerald-100 text-emerald-700";
                                        return (
                                            <div key={latest.parentId || latest.id || gi} className="px-4 py-3 sm:px-6 sm:py-4">
                                                {/* 콘텐츠 그룹 헤더 (최신 라운드 기준 요약) */}
                                                <div className="flex items-center gap-2 sm:gap-3 mb-2">
                                                    <div className={`w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full shrink-0 ${glc.bar}`}></div>
                                                    <span className="text-[9px] sm:text-[10px] font-bold text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded shrink-0">{latest.contentType}</span>
                                                    <span className="text-xs sm:text-sm font-bold text-slate-800 truncate flex-1">{latest.campaign || "미지정"}</span>
                                                    <span className={`px-1.5 py-0.5 rounded font-semibold text-[9px] sm:text-[10px] shrink-0 ${gState}`}>{latest.approvalState}</span>
                                                    <span className="text-[9px] sm:text-[10px] font-bold text-slate-500 bg-slate-50 border border-slate-200 px-1.5 py-0.5 rounded-full shrink-0">{grp.rounds.length}회</span>
                                                </div>
                                                {/* 라운드 체인: 1차 → 2차 → 3차 */}
                                                <div className="pl-3 sm:pl-4 ml-1 border-l-2 border-slate-100 space-y-1">
                                                    {grp.rounds.map((h, idx) => {
                                                        const clc = LVL[h.level] || LVL.GREEN;
                                                        const label = (h.reviewRound||1) === 1 ? "1차 검수" : `${h.reviewRound}차 재검수`;
                                                        return (
                                                            <div key={h.id || idx} onClick={() => { setResult(h); setTab(1); window.scrollTo({top:0, behavior:'smooth'}); }}
                                                                 className="flex items-center gap-2 sm:gap-3 py-1.5 px-2 -ml-2 rounded-lg hover:bg-slate-50 cursor-pointer group">
                                                                <span className="text-[10px] sm:text-xs font-semibold text-slate-400 w-14 sm:w-20 shrink-0 group-hover:text-brand-600 transition-colors">{label}</span>
                                                                <span className={`text-[9px] sm:text-[10px] font-bold px-1.5 py-0.5 rounded shrink-0 ${clc.light} ${clc.txt}`}>{clc.label}</span>
                                                                <span className="text-[10px] sm:text-xs text-slate-400 flex-1 truncate">{typeof h.ts === 'string' ? h.ts.substring(0,16) : ''}</span>
                                                                <span className={`text-xs sm:text-sm font-black shrink-0 ${clc.txt}`}>{h.score}<span className="text-[9px] font-semibold opacity-70 ml-0.5">점</span></span>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
